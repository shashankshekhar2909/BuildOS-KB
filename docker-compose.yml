version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: buildos
      POSTGRES_PASSWORD: buildos
      POSTGRES_DB: buildos
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buildos"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6382:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]
    environment:
      DATABASE_URL: postgresql+asyncpg://buildos:buildos@postgres:5432/buildos
      REDIS_URL: redis://redis:6379
      HOST: 0.0.0.0
    env_file: .env
    volumes:
      - ${HOME}/project:${HOME}/project:ro
      - ${HOME}/projects:${HOME}/projects:ro
    ports:
      - "8010:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["python", "-m", "arq", "app.workers.scheduler.WorkerSettings"]
    environment:
      DATABASE_URL: postgresql+asyncpg://buildos:buildos@postgres:5432/buildos
      REDIS_URL: redis://redis:6379
    env_file: .env
    volumes:
      - ${HOME}/project:${HOME}/project:ro
      - ${HOME}/projects:${HOME}/projects:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  mcp:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["python", "-m", "app.mcp_server"]
    environment:
      DATABASE_URL: postgresql+asyncpg://buildos:buildos@postgres:5432/buildos
      REDIS_URL: redis://redis:6379
    env_file: .env
    ports:
      - "8090:8100"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      API_INTERNAL_URL: http://api:8000
    ports:
      - "3100:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
